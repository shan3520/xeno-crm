<svg width="1280" height="860" viewBox="0 0 1280 860" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#9a948a"/>
    </marker>
    <marker id="arrowBrass" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#d4a84b"/>
    </marker>
    <marker id="arrowEmerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5cc98f"/>
    </marker>
    <style>
      .card { fill: #20201c; stroke: #3a382f; stroke-width: 1.5; rx: 14; }
      .title { fill: #f2efe9; font-size: 19px; font-weight: 700; }
      .sub { fill: #a8a39a; font-size: 13px; }
      .body { fill: #cfcabf; font-size: 13.5px; }
      .tag { fill: #a8a39a; font-size: 11px; font-weight: 600; letter-spacing: 1.3px; }
      .edge { fill: #9a948a; font-size: 12.5px; }
      .zone { fill: #1a1814; stroke: #2e2c25; stroke-width: 1.5; stroke-dasharray: 6 5; rx: 18; }
      .zonelabel { font-size: 13px; font-weight: 700; letter-spacing: 1px; }
    </style>
  </defs>

  <rect width="1280" height="860" fill="#141210"/>

  <!-- Header -->
  <text x="48" y="58" class="title" font-size="26">Looms — system architecture</text>
  <text x="48" y="84" class="sub" font-size="14">Three independently-deployable services, communicating over HTTP, meeting only at the frozen <tspan fill="#d4a84b" font-family="monospace">@xeno/shared</tspan> contracts.</text>

  <!-- ZONE A: authoring -->
  <rect x="40" y="120" width="470" height="380" class="zone"/>
  <text x="62" y="150" class="zonelabel" fill="#5bb0d7">1 · CAMPAIGN AUTHORING — synchronous, AI</text>

  <!-- ZONE B: send & track -->
  <rect x="540" y="120" width="700" height="600" class="zone"/>
  <text x="562" y="150" class="zonelabel" fill="#5cc98f">2 · SEND &amp; TRACK — asynchronous, callback-driven</text>

  <!-- Marketer -->
  <rect x="70" y="180" width="160" height="70" class="card" rx="14"/>
  <text x="150" y="212" text-anchor="middle" class="title" font-size="16">Marketer</text>
  <text x="150" y="233" text-anchor="middle" class="sub">browser</text>

  <!-- web -->
  <rect x="280" y="172" width="200" height="86" class="card" rx="14"/>
  <text x="296" y="198" class="tag" fill="#d4a84b">WEB · NEXT.JS 15 · VERCEL</text>
  <text x="296" y="222" class="body" font-weight="700" fill="#f2efe9">Console UI</text>
  <text x="296" y="242" class="body">/api/chat — AI orchestration</text>

  <!-- LLM providers -->
  <rect x="280" y="350" width="200" height="92" class="card" rx="14"/>
  <text x="296" y="376" class="tag" fill="#5bb0d7">LLM PROVIDERS · FREE TIER</text>
  <text x="296" y="400" class="body">Groq llama-3.3-70b</text>
  <text x="296" y="420" class="body">↳ Gemini 2.5 Flash (fallback)</text>
  <text x="296" y="436" class="sub" font-size="11.5">env-ordered chain · non-Anthropic</text>

  <!-- Marketer -> web -->
  <line x1="230" y1="215" x2="278" y2="215" stroke="#9a948a" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- web <-> LLM -->
  <line x1="380" y1="258" x2="380" y2="348" stroke="#5bb0d7" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="392" y="308" class="edge" fill="#5bb0d7">streamText</text>
  <text x="392" y="324" class="edge" fill="#5bb0d7" font-size="11">tool calls · stream</text>

  <!-- crm-api -->
  <rect x="566" y="180" width="320" height="210" class="card" rx="14"/>
  <text x="586" y="208" class="tag" fill="#d4a84b">CRM-API · NESTJS + PRISMA · RENDER</text>
  <text x="586" y="232" class="body" font-weight="700" fill="#f2efe9">Domain + system of record · sole DB writer</text>
  <line x1="586" y1="246" x2="866" y2="246" stroke="#2e2c25" stroke-width="1"/>
  <text x="586" y="270" class="body">• ingest · customers · orders · segments</text>
  <text x="586" y="292" class="body">• campaigns · analytics · chat persistence</text>
  <text x="586" y="314" class="body">• in-process send-worker — claim loop</text>
  <text x="600" y="332" class="sub" font-size="12">FOR UPDATE SKIP LOCKED · lease · backoff · dead-letter</text>
  <text x="586" y="354" class="body">• reconcile sweep · rate limit · CORS</text>
  <text x="586" y="376" class="body">• /receipts — HMAC-verified, idempotent</text>

  <!-- channel-stub -->
  <rect x="936" y="180" width="270" height="120" class="card" rx="14"/>
  <text x="956" y="208" class="tag" fill="#5cc98f">CHANNEL-STUB · FASTIFY · RENDER</text>
  <text x="956" y="232" class="body" font-weight="700" fill="#f2efe9">Fake provider</text>
  <text x="956" y="254" class="body">lifecycle simulator · jittered timers</text>
  <text x="956" y="276" class="body">signs callbacks (HMAC) · dup chaos</text>

  <!-- Postgres -->
  <rect x="566" y="470" width="320" height="92" class="card" rx="14"/>
  <text x="586" y="496" class="tag" fill="#d98aa8">POSTGRES · NEON</text>
  <text x="586" y="520" class="body" font-weight="700" fill="#f2efe9">Single database — owned by crm-api</text>
  <text x="586" y="542" class="body">data + the queue (Communication rows = work items)</text>

  <!-- web -> crm-api -->
  <line x1="480" y1="210" x2="564" y2="210" stroke="#d4a84b" stroke-width="2.5" marker-end="url(#arrowBrass)"/>
  <text x="498" y="200" class="edge" fill="#d4a84b" font-size="12">REST</text>
  <text x="486" y="232" class="sub" font-size="11">preview · launch · stats</text>

  <!-- crm-api -> channel-stub -->
  <line x1="886" y1="226" x2="934" y2="226" stroke="#9a948a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="868" y="216" class="edge" font-size="11.5">POST</text>
  <text x="862" y="248" class="edge" font-size="11.5">/send</text>

  <!-- channel-stub -> crm-api /receipts (curved back) -->
  <path d="M1060 300 C1060 420, 905 420, 890 360" fill="none" stroke="#5cc98f" stroke-width="2.5" marker-end="url(#arrowEmerald)"/>
  <text x="950" y="404" class="edge" fill="#5cc98f" font-size="12">POST /receipts</text>
  <text x="930" y="422" class="sub" fill="#5cc98f" font-size="11">async · jittered · out-of-order · HMAC-signed</text>

  <!-- crm-api -> Postgres -->
  <line x1="726" y1="390" x2="726" y2="468" stroke="#9a948a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="736" y="436" class="edge" font-size="11.5">SQL</text>

  <!-- Keepalive zone -->
  <rect x="566" y="592" width="640" height="108" class="card" rx="14"/>
  <text x="586" y="618" class="tag" fill="#a8a39a">FREE-TIER OPS</text>
  <text x="586" y="642" class="body" font-weight="700" fill="#f2efe9">GitHub Actions cron — keepalive</text>
  <text x="586" y="664" class="body">GET /health on both Render services to mitigate cold starts;</text>
  <text x="586" y="684" class="body">the web cold-start banner also pings crm-api /health on load.</text>

  <!-- Footer note -->
  <text x="48" y="788" class="sub" font-size="12.5">Status = projection over the append-only <tspan fill="#d4a84b" font-family="monospace">CommunicationEvent</tspan> log (precedence on occurredAt) — arrival-order-independent. The AI never writes the DB.</text>
  <text x="48" y="810" class="sub" font-size="12.5">Local ports — web <tspan fill="#f2efe9">3000</tspan> · crm-api <tspan fill="#f2efe9">3001</tspan> · channel-stub <tspan fill="#f2efe9">3002</tspan>.</text>

  <!-- legend -->
  <text x="980" y="788" class="tag" fill="#a8a39a">LEGEND</text>
  <line x1="980" y1="800" x2="1010" y2="800" stroke="#d4a84b" stroke-width="2.5"/>
  <text x="1016" y="804" class="sub" font-size="11.5">REST (sync)</text>
  <line x1="980" y1="820" x2="1010" y2="820" stroke="#5cc98f" stroke-width="2.5"/>
  <text x="1016" y="824" class="sub" font-size="11.5">callback (async)</text>
  <line x1="1120" y1="800" x2="1150" y2="800" stroke="#5bb0d7" stroke-width="2"/>
  <text x="1156" y="804" class="sub" font-size="11.5">LLM stream</text>
</svg>
